## ユーザー
# メールアドレス確認URLの有効期限（単位：時間）
confirm_within_hours: 24
# パスワード再設定URLの有効期限（単位：時間）
reset_password_within_hours: 24
# アカウント削除の猶予期間（単位：日）
destroy_schedule_days: 7
# アカウント削除完了メール送信(true or false)  Tips:「rails user:destroy[false]」をcronで実行（メール送信する場合、夜間は避けた方が良い）
sendmail_destroy_completed: true
# 氏名の最小・最大文字数
user_name_minimum: 1
user_name_maximum: 32

## お知らせ
# 新しいお知らせの最大表示件数
infomations_limit: 5
# 一覧のデフォルト最大表示件数
default_infomations_limit: 25

## 顧客
# 一覧のデフォルト最大表示件数
default_customers_limit: 25
# 顧客コードの最小・最大文字数
customer_code_minimum: 1
customer_code_maximum: 32
# 顧客名の最小・最大文字数
customer_name_minimum: 1
customer_name_maximum: 32

## メンバー
# 一覧のデフォルト最大表示件数
default_members_limit: 25

## スペース
# 参加スペースの最大表示件数
join_spaces_limit: 5
# 公開スペースの最大表示件数
public_spaces_limit: 5
# 一覧のデフォルト最大表示件数
default_spaces_limit: 25
# サブドメインの最小・最大文字数
subdomain_minimum: 1
subdomain_maximum: 32
# スペース名の最小・最大文字数
space_name_minimum: 1
space_name_maximum: 32
