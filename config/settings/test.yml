env_name: ''
base_domain: 'base.localhost.test'
cookie_domain: 'base.localhost.test'
mailer_from:
  name: '%{app_name}'
  email: 'noreply@localhost.test'

## ユーザー
# ユーザー名の最小・最大文字数
user_name_minimum: 2  # Tips: 2以上、(7+5?)以下 = "admin(#{n})", "user(#{n})"
user_name_maximum: 12 # Tips: (7+5?)以上

## お知らせ
# お知らせの最大表示件数
infomations_limit: 4 # Tips: 高速化の為（4以上、下記の合計値と一致）
test_infomations:
  all_forever_count: 1
  all_future_count: 1
  user_forever_count: 1
  user_future_count: 1
# 一覧のデフォルト最大表示件数
default_infomations_limit: 4 # Tips: 高速化の為（infomations_limitと同じ）

## 顧客
# 一覧のデフォルト最大表示件数
default_customers_limit: 3 # Tips: 高速化の為（3以上、下記の合計値と一致）
test_customers_owner: 1
test_customers_admin: 1
test_customers_member: 1
# 組織・団体名の最小・最大文字数
customer_name_minimum: 2  # 2以上、Tips: (10+5?)以下 = "customer(#{n})"
customer_name_maximum: 15 # Tips: (10+5?)以上

## メンバー
# 一覧のデフォルト最大表示件数
default_members_limit: 4 # Tips: 高速化の為（4以上、下記の合計値+1）
test_members_owner: 1
test_members_admin: 1
test_members_member: 1

## スペース
# 参加スペースの最大表示件数
join_spaces_limit: 3 # Tips: 高速化の為（3以上、default_spaces_limitと一致）
# 公開スペースの最大表示件数
public_spaces_limit: 3 # Tips: 高速化の為
# 一覧のデフォルト最大表示件数
default_spaces_limit: 3 # Tips: 高速化の為（3以上、下記の合計値と一致）
test_spaces_owner: 1
test_spaces_admin: 1
test_spaces_member: 1
# サブドメインの最小・最大文字数
subdomain_minimum: 2  # Tips: 2以上、(9+5?)以下 = "space#{n}name"
subdomain_maximum: 14 # Tips: (9+5?)以上
# スペース名の最小・最大文字数
space_name_minimum: 2  # Tips: 2以上、(6+9+5?)以下 = "#{subdomain}のスペース名"
space_name_maximum: 20 # Tips: (6+9+5?)以上
# 目的の最小・最大文字数
space_purpose_minimum: 2 # Tips: 2以上、(3+9+5?)以下 = "#{subdomain}の目的"
space_purpose_maximum: 17 # Tips: (3+9+5?)以上
